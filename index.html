<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AR Menu Donat</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<script>

AFRAME.registerComponent("ui-mode",{
init:function(){

const overlayScan=document.querySelector(".scanner-overlay")
const menu=document.querySelector("#menu-utama")

this.el.addEventListener("targetFound",()=>{

console.log("Marker ditemukan")

overlayScan.classList.add("hidden")

menu.classList.remove("hidden")

})

}
})


AFRAME.registerComponent("main-menu",{

init:function(){

const menuUtama=document.querySelector("#menu-utama")
const menuDonat=document.querySelector("#menu-donat")
const menuDimsum=document.querySelector("#menu-dimsum")
const menuCookies=document.querySelector("#menu-cookies")

// tombol utama
document.querySelector("#btn-donat").onclick=()=>{

menuUtama.classList.add("hidden")
menuDonat.classList.remove("hidden")

}

document.querySelector("#btn-dimsum").onclick=()=>{

menuUtama.classList.add("hidden")
menuDimsum.classList.remove("hidden")

}

document.querySelector("#btn-cookies").onclick=()=>{

menuUtama.classList.add("hidden")
menuCookies.classList.remove("hidden")

}

// tombol kembali

document.querySelector("#close-donat").onclick=()=>{

menuDonat.classList.add("hidden")
menuUtama.classList.remove("hidden")

}

document.querySelector("#close-dimsum").onclick=()=>{

menuDimsum.classList.add("hidden")
menuUtama.classList.remove("hidden")

}

document.querySelector("#close-cookies").onclick=()=>{

menuCookies.classList.add("hidden")
menuUtama.classList.remove("hidden")

}

}

})

</script>

<style>

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
}

/* scanner */

.scanner-overlay{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

display:flex;
align-items:center;
justify-content:center;

z-index:10;

background:rgba(0,0,0,0.3);

animation:pulse 2s infinite;

}

@keyframes pulse{

0%{opacity:0.5}
50%{opacity:1}
100%{opacity:0.5}

}

.scan-img{

width:70%;
max-width:300px;

border-radius:10px;

}

/* menu utama */

#menu-utama{

position:fixed;

top:50%;
left:50%;

transform:translate(-50%,-50%);

display:flex;

gap:20px;

background:white;

padding:20px;

border-radius:15px;

box-shadow:0 5px 20px rgba(0,0,0,0.4);

z-index:20;

}

.menu-icon{

width:80px;
height:80px;

cursor:pointer;

transition:0.2s;

}

.menu-icon:active{

transform:scale(0.9)

}

/* popup */

.popup{

position:fixed;

top:50%;
left:50%;

transform:translate(-50%,-50%);

background:white;

padding:20px;

border-radius:20px;

width:80%;
max-width:400px;

box-shadow:0 10px 25px rgba(0,0,0,0.4);

display:flex;

flex-wrap:wrap;

gap:10px;

justify-content:center;

z-index:30;

}

.popup img{

width:80px;
height:80px;

object-fit:cover;

border-radius:10px;

}

.popup button{

width:100%;

margin-top:10px;

padding:10px;

border:none;

border-radius:10px;

background:#ff6b6b;

color:white;

font-weight:bold;

cursor:pointer;

}

.hidden{

display:none !important

}

.menu-title{
width:100%;
text-align:center;
margin-bottom:10px;
font-size:24px;
font-weight:bold;
}

</style>
</head>

<body>

<!-- SCANNER CUSTOM -->

<div class="scanner-overlay">

<img src="TY Card (1).jpg" class="scan-img">

</div>

<!-- MENU UTAMA -->

<div id="menu-utama" class="hidden">

<img id="btn-donat" src="icons/2.png" class="menu-icon">
<img id="btn-dimsum" src="icons/1.png" class="menu-icon">
<img id="btn-cookies" src="icons/3.2.png" class="menu-icon">

</div>


<!-- MENU DONAT -->

<div id="menu-donat" class="popup hidden">

<h3 class="menu-title">Varian Donat</h3>

<img src="GambarDonat/4.png">
<img src="GambarDonat/5.png">
<img src="GambarDonat/6.png">
<img src="GambarDonat/7.png">
<img src="GambarDonat/8.png">
<img src="GambarDonat/9.png">

<button id="close-donat">Kembali</button>

</div>


<!-- MENU DIMSUM -->

<div id="menu-dimsum" class="popup hidden">

<h3 class="menu-title">Varian Dimsum</h3>

<img src="GambarDimsum/Dimsum 1.jpg">
<img src="GambarDimsum/Dimsum 2.jpg">
<img src="GambarDimsum/Dimsum 3.jpg">

<button id="close-dimsum">Kembali</button>

</div>


<!-- MENU COOKIES -->

<div id="menu-cookies" class="popup hidden">

<h3 class="menu-title">Varian Cookies</h3>

<img src="GambarCookies/Cookies 1.jpg">
<img src="GambarCookies/Cookies 2.jpg">

<button id="close-cookies">Kembali</button>

</div>


<!-- SCENE AR -->

<a-scene

mindar-image="imageTargetSrc: TyCardCompiled2.mind; uiScanning:no; uiLoading:no; uiError:no;"

color-space="sRGB"

renderer="colorManagement: true"

vr-mode-ui="enabled: false"

device-orientation-permission-ui="enabled: false"

>

<a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

<a-entity mindar-image-target="targetIndex:0" ui-mode main-menu></a-entity>

</a-scene>

</body>
</html>
